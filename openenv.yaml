spec_version: 1
name: legaloom_env
version: "1.0.0"
description: >
  TDS (Tax Deducted at Source) compliance environment for Indian financial
  back-office tasks. Agent analyses vendor invoices and computes the exact
  TDS deduction in INR across 4 difficulty levels (easy/medium/hard/expert).
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: task_easy
    description: Single invoice, clear section, valid PAN, above threshold
    max_steps: 6
    difficulty: easy
  - id: task_medium
    description: Mixed invoice or threshold boundary, requires YTD check
    max_steps: 8
    difficulty: medium
  - id: task_hard
    description: Inoperative PAN (20% override) or GST-bundled base
    max_steps: 8
    difficulty: hard
  - id: task_expert
    description: New FY 2025-26 sections — 194T partner payment or 194Q bulk goods
    max_steps: 10
    difficulty: expert

action_schema:
  type: object
  additionalProperties: false
  required:
    - action_type
    - parameters
  properties:
    action_type:
      type: string
      enum:
        - read_invoice
        - check_pan
        - check_threshold
        - query_ytd
        - lookup_section
        - query_law
        - submit_answer
    parameters:
      type: object
      additionalProperties: true
  allOf:
    - if:
        properties:
          action_type:
            const: read_invoice
      then:
        properties:
          parameters:
            type: object
            additionalProperties: false
    - if:
        properties:
          action_type:
            const: check_pan
      then:
        properties:
          parameters:
            type: object
            additionalProperties: false
            required: [pan]
            properties:
              pan:
                type: string
                minLength: 10
                maxLength: 10
    - if:
        properties:
          action_type:
            const: check_threshold
      then:
        properties:
          parameters:
            type: object
            additionalProperties: false
            required: [section, amount]
            properties:
              section:
                type: string
              amount:
                type: number
                minimum: 0
    - if:
        properties:
          action_type:
            const: query_ytd
      then:
        properties:
          parameters:
            type: object
            additionalProperties: false
            required: [pan]
            properties:
              pan:
                type: string
                minLength: 10
                maxLength: 10
    - if:
        properties:
          action_type:
            const: lookup_section
      then:
        properties:
          parameters:
            type: object
            additionalProperties: false
            required: [description]
            properties:
              description:
                type: string
                minLength: 1
    - if:
        properties:
          action_type:
            const: query_law
      then:
        properties:
          parameters:
            type: object
            additionalProperties: false
            required: [section]
            properties:
              section:
                type: string
    - if:
        properties:
          action_type:
            const: submit_answer
      then:
        properties:
          parameters:
            type: object
            additionalProperties: false
            required: [tds_amount_inr, section, rate_percent]
            properties:
              tds_amount_inr:
                type: number
                minimum: 0
              section:
                type: string
              rate_percent:
                type: number
                minimum: 0
              no_tds:
                oneOf:
                  - type: boolean
                  - type: string
                    enum: ["true", "false"]

observation_schema:
  type: object
  additionalProperties: false
  required:
    - invoice_text
    - action_result
    - available_actions
    - steps_used
    - max_steps
    - hint
    - done
    - reward
  properties:
    invoice_text:
      type: string
    action_result:
      type: string
    available_actions:
      type: array
      items:
        type: string
    steps_used:
      type: integer
      minimum: 0
    max_steps:
      type: integer
      minimum: 1
    hint:
      type: string
    done:
      type: boolean
    reward:
      type: number
    reward_info:
      type: object
      additionalProperties: false
      required:
        - step_reward
        - cumulative_reward
        - components
      properties:
        step_reward:
          type: number
        cumulative_reward:
          type: number
        final_score:
          type:
            - number
            - "null"
        components:
          type: object
          additionalProperties:
            type: number

state_schema:
  type: object
  additionalProperties: false
  required:
    - episode_id
    - step_count
    - task_id
    - difficulty
    - pan_checked
    - section_identified
    - answer_submitted
  properties:
    episode_id:
      type: string
    step_count:
      type: integer
      minimum: 0
    task_id:
      type: string
    difficulty:
      type: string
      enum: [easy, medium, hard, expert]
    pan_checked:
      type: boolean
    section_identified:
      type: boolean
    answer_submitted:
      type: boolean
